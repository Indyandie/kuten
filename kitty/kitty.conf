# General settings
enable_ipc yes
env TERM=xterm-256color

# Window settings
initial_window_width 100c
initial_window_height 30c
window_padding_width 8
hide_window_decorations yes
startup_mode maximized
background_opacity 0.75
background_blur 32

# Scrolling
scrollback_lines 10000
wheel_scroll_multiplier 3.0

# Bell
visual_bell_duration 200
visual_bell_color #aa0000

# Selection
copy_on_select yes

# Cursor
cursor_shape block
cursor_blink_interval -1
cursor_stop_blinking_after 15
cursor_shape_when_blurred hollow
cursor_beam_thickness 1.5

# Terminal
clipboard_control write-clipboard write-primary

# Mouse
mouse_hide_wait 3.0
mouse_map left ctrl+shift click expand_selection

# Font (from keys.toml)
font_family JetBrainsMono Nerd Font
font_size 12
bold_font JetBrainsMono Nerd Font Bold
italic_font JetBrainsMono Nerd Font Light
bold_italic_font JetBrainsMono Nerd Font ExtraBold Italic
builtin_box_drawing no

# Shell (from keys.toml)
shell zsh -l

# Keyboard bindings (translated from keys.toml)
map ctrl+v paste_from_clipboard
map ctrl+c copy_to_clipboard
map shift+insert paste_from_selection
map ctrl+0 change_font_size all 0
map ctrl+= change_font_size all +1
map ctrl++ change_font_size all +1
map ctrl+- change_font_size all -1
map ctrl+alt+j scroll_line_down
map ctrl+alt+k scroll_line_up
map ctrl+n new_os_window
map ctrl+alt+shift+v toggle_vi_mode
map right search_forward
map left search_backward
map ctrl+shift+? search_forward

# Hints (alacritty hints mapped to kitty url hints, default key ctrl+shift+u)
url_hints_bg #d23e08
url_hints_fg #ffffff

# Colors (kurokula theme)
background #141515
foreground #ddd0c4
selection_background #515151
selection_foreground #ffc663
cursor #ffc663
cursor_text_color #141515
color0 #333333
color1 #b66056
color2 #85b1a9
color3 #dbbb43
color4 #6890d7
color5 #887aa3
color6 #837369
color7 #ddd0c4
color8 #515151
color9 #ffc663
color10 #c1ffae
color11 #fff700
color12 #a1d9ff
color13 #a994ff
color14 #f9cfb9
color15 #ffffff

# Search highlights
search_highlight_background #515151
search_highlight_foreground #ffc663
active_search_highlight_background #ffc663
active_search_highlight_foreground #000000

# Vi mode cursor
cursor_text_color_for_vi_mode #000000
cursor_color_for_vi_mode #ffa2ed

# Footer bar (mapped to tab bar, as kitty uses tab bar for similar UI)
tab_bar_background #515151
tab_bar_foreground #ffc663
